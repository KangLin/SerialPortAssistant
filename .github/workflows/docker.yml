# Author: Kang Lin <kl222@126.com>

name: docker

on:
  workflow_call:
    outputs:
      name:
        description: "The artifact name"
        value: ${{ jobs.build_docker.outputs.name }}

env:
  GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

jobs:
  build_docker:
    strategy:
      matrix:
        variant:
          - PACKAGE: deb
            image: ubuntu
            lable: "25.04"
            os: ubuntu-24.04
          - PACKAGE: deb
            image: ubuntu
            lable: "25.04"
            os: ubuntu-24.04-arm
          - PACKAGE: deb
            image: ubuntu
            lable: "26.04"
            os: ubuntu-24.04
          - PACKAGE: deb
            image: ubuntu
            lable: "26.04"
            os: ubuntu-24.04-arm

          - PACKAGE: deb
            image: debian
            lable: "12"
            os: ubuntu-24.04
          - PACKAGE: deb
            image: debian
            lable: "12"
            os: ubuntu-24.04-arm
          - PACKAGE: deb
            image: debian
            lable: "13"
            os: ubuntu-24.04
          - PACKAGE: deb
            image: debian
            lable: "13"
            os: ubuntu-24.04-arm

          - PACKAGE: rpm
            image: fedora
            lable: "43"
            os: ubuntu-24.04
          - PACKAGE: rpm
            image: fedora
            lable: "43"
            os: ubuntu-24.04-arm
          - PACKAGE: rpm
            image: fedora
            lable: "42"
            os: ubuntu-24.04
          - PACKAGE: rpm
            image: fedora
            lable: "42"
            os: ubuntu-24.04-arm
          - PACKAGE: rpm
            image: fedora
            lable: "41"
            os: ubuntu-24.04
          - PACKAGE: rpm
            image: fedora
            lable: "41"
            os: ubuntu-24.04-arm

    # See: [About GitHub-hosted runners](https://docs.github.com/actions/using-github-hosted-runners/about-github-hosted-runners/about-github-hosted-runners)
    # See: [Choosing the runner for a job](https://docs.github.com/actions/writing-workflows/choosing-where-your-workflow-runs/choosing-the-runner-for-a-job)
    # See: https://github.com/actions/runner-images/
    runs-on: ${{matrix.variant.os}}

    env:
      SerialPortAssistant_VERSION: 0.5.34-dev
      artifact_name: build_docker
      BUILD_DIR:   ${{github.workspace}}/build
      SOURCE_DIR:  ${{github.workspace}}/.cache/source
      TOOLS_DIR:   ${{github.workspace}}/.cache/tools_${{matrix.variant.os}}
      INSTALL_DIR: ${{github.workspace}}/.cache/install_docker_${{matrix.variant.PACKAGE}}_${{matrix.variant.image}}_${{matrix.variant.lable}}_${{matrix.variant.os}}
      BUILD_VERBOSE: ${{matrix.variant.BUILD_VERBOSE}}

    # Map the job outputs to step outputs
    outputs:
      name: ${{ env.artifact_name }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Make directories
        run: |
          cmake -E make_directory ${{env.BUILD_DIR}}
          cmake -E make_directory ${{env.SOURCE_DIR}}
          cmake -E make_directory ${{env.TOOLS_DIR}}
          cmake -E make_directory ${{env.INSTALL_DIR}}

      - name: run docker
        run: |
          if [ -n "${{matrix.variant.lable}}" ]; then
            docker_image="${{matrix.variant.image}}:${{matrix.variant.lable}}"
          else
            docker_image="${{matrix.variant.image}}"
          fi
          ./Script/build_linux.sh --docker --docker-image="${docker_image}" --docker-platform="${{matrix.variant.platform}}" --${{matrix.variant.PACKAGE}}

      - name: Update artifact
        if: ${{matrix.variant.PACKAGE == 'rpm'}}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.artifact_name }}_${{matrix.variant.PACKAGE}}_${{matrix.variant.image}}_${{matrix.variant.os}}
          path: |
            ${{github.workspace}}/build_linux/serialportassistant*.rpm
